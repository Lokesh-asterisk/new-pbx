[US4GROUP]
exten => s,1,Progress()
;same => n,Set(Caller=${CALLERID(num)})
same => n,Set(Caller=${FILTER(0-9,a-zA-Z,${CALLERID(num)})})
same => n,Set(__CustomerChannel=${CHANNEL})
same => n,Set(CallerDnid=${CALLERID(dnid)})
same => n,Set(CallStartTime=${EPOCH})
same => n,Set(ServerIP=ServerUS4GROUP)
same => n,Set(FlowType=Normal)
same => n,Set(__TransferStatus=NO)
same => n,Set(__TransferAgent=0)
same => n,GOTO(checkAccountStatus,1)
same => n(HangME),HangUp()


exten => checkAccountStatus,1,NoOP(${US4GROUP_CheckAccountStatus}?DID=${CallerDnid}&CallerNumber=${Caller}&CallUniqueID=${UNIQUEID})
same => n,Set(AccountInformation=${SHELL(curl "${US4GROUP_CheckAccountStatus}DID=${CallerDnid}&CallerNumber=${Caller}&CallUniqueID=${UNIQUEID}")})
same => n,Set(ARRAY(CallStatus,CallCause,CDRID,UserID,Destination_Action,Destination_Value)=${AccountInformation})
same => n,Set(TIMEOUT(absolute)=7200)
same => n,Set(LastLocation=AccountCheck)
same => n,Set(CHANNEL(hangup_handler_push)=callstatus,1)
same => n,ExecIf($[${Destination_Action} != 6]?Answer())
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?s,HangME)
same => n,GOTO(WhereToGO,1)
same => n,Return()


exten => Queue,1,NoOp((Destination Action :: ${Destination_Action} :: Destination Value ::${Destination_Value})
same => n,Set(LastLocation=Queue)
same => n,Set(NOW=${EPOCH})
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
same => n,Set(QueueStatus=${SHELL(curl "${US4GROUP_GetQueueInfo}QueueID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,QueueName,QueueTimeOut,Destination_Action,Destination_Value)=${QueueStatus})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?HangME)
same => n,Set(RecName=${QueueName}-${Caller}-${CallStartTime}-${UserID}-${CDRID}-${UNIQUEID}-Queue)
same => n,Set(SaveQueueInfo=${SHELL(curl "${US4GROUP_SaveQueueInfo}QueueID=${Destination_Value}&UserID=${UserID}&CdrID=${CDRID}&CallUniqueID=${UNIQUEID}&DID=${CallerDnid}&CallerNumber=${Caller}&RecPath=${URIENCODE(${RecName})}")})
same => n,Set(QueueTimeOut=${IF($[${LEN(${QueueTimeOut})}>0]?${QueueTimeOut}:1)})
same => n,Set(MONITOR_FILENAME=${RecPath}${UserID}/${YEAR}-${MONTH}/${DAY}/Queue/${RecName})
same => n,Queue(${QueueName},ht,,,${QueueTimeOut},,,SendResponse,,)
same => n,NoOP(${QUEUESTATUS})
same => n,GoToIf($["${QUEUESTATUS}" = "LEAVEEMPTY"]?WhereToGO,1)
same => n,GoToIf($["${QUEUESTATUS}" = "TIMEOUT"]?WhereToGO,1)
same => n(HangME),HangUP()

exten => C2C_QUEUE,1,NoOP(Welcome)
same => n,Set(FlowType=Custom)
same => n,Set(CallerDnid=${CustomerNumber})
same => n,Set(CallerNumber=${CustomerNumber})
same => n,Set(CALLERID(NUMBER)=${CustomerNumber})
same => n,Set(CALLERID(NAME)=${CustomerNumber})
same => n,Set(CALLERID(num)=${CustomerNumber})
same => n,Set(CONNECTEDLINE(number,i)=${CustomerNumber})
same => n,Set(CONNECTEDLINE(name)=${CustomerNumber})
same => n,Set(AccountInformation=${SHELL(curl "${US4GROUP_CheckC2CStatus}DID=${DID}&CallerNumber=${CustomerNumber}&CallUniqueID=${UNIQUEID}")})
same => n,Set(ARRAY(CallStatus,CallCause,CDRID,UserID,Destination_Action,Destination_Value)=${AccountInformation})
same => n,Set(TIMEOUT(absolute)=7200)
same => n,Set(LastLocation=C2C_QUEUE)
same => n,Set(CHANNEL(hangup_handler_push)=callstatus,1)
same => n,ExecIf($[${Destination_Action} != 6]?Answer())
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?s,HangME)
same => n,Set(LastLocation=Queue)
same => n,Set(NOW=${EPOCH})
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
same => n,Set(QueueStatus=${SHELL(curl "${US4GROUP_GetQueueInfo}QueueID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,QueueName,QueueTimeOut,Destination_Action,Destination_Value)=${QueueStatus})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?HangME)
same => n,Set(RecName=${QueueName}-${Caller}-${CallStartTime}-${UserID}-${CDRID}-${UNIQUEID}-Queue)
same => n,Set(SaveQueueInfo=${SHELL(curl "${US4GROUP_SaveQueueInfo}QueueID=${Destination_Value}&UserID=${UserID}&CdrID=${CDRID}&CallUniqueID=${UNIQUEID}&DID=${CallerDnid}&CallerNumber=${Caller}&RecPath=${URIENCODE(${RecName})}")})
same => n,Set(QueueTimeOut=${IF($[${LEN(${QueueTimeOut})}>0]?${QueueTimeOut}:1)})
same => n,Set(MONITOR_FILENAME=${RecPath}${UserID}/${YEAR}-${MONTH}/${DAY}/Queue/${RecName})
same => n,Queue(${QueueName},ht,,,${QueueTimeOut},,,SendResponse,,)
same => n,NoOP(${QUEUESTATUS})
same => n(HangME),HangUP()

;same => n,GOTO(WhereToGO,1)
;same => n,Return()

exten => _1000,1,Queue(1001,ht,,,40,,,,,)
exten => _1000,n,HangUp()

exten => VoiceMail,1,NoOp(IVR Action :: ${IVR_Action} :: IVR_VALUE ::${IVR_Value})
same => n,Set(LastLocation=VoiceMail)
same => n,Set(NOW=${EPOCH})
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
same => n,Set(VoiceMailDetail=${SHELL(curl "${US4GROUP_GetVoiceMailDetail}VoiceMailID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,VoiceMailGreeting,VoiceMailTimeOut)=${VoiceMailDetail})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?hang)
same => n,GoSub(PlayFile,1(${VoiceMailGreeting}))
same => n,Set(RecName=${Caller}-${CallStartTime}-${UserID}-${CDRID}-${UNIQUEID}-VoiceMail)
same => n,Record(${RecPath}${UserID}/${YEAR}-${MONTH}/${DAY}/VoiceMail/${RecName}.wav,,${VoiceMailTimeOut},tky)
same => n,NooP(Record FIle :: ${RECORDED_FILE})
same => n(hang),HangUp()

exten => WhereToGO,1,NoOP("WHERE TO GO")
same => n,GoToIf($[${Destination_Action} = 0]?s,HangME)
same => n,ExecIf($[${Destination_Action} = 1]?GoSub(PlayFile,1(${Destination_Value})))
same => n,GoToIf($[${Destination_Action} = 2]?Queue,1)
same => n,GoToIf($[${Destination_Action} = 3]?IVR,1)
same => n,GoToIf($[${Destination_Action} = 4]?VoiceMail,1)
same => n,GoToIf($[${Destination_Action} = 5]?TimeCondition,1)
same => n,GoToIf($[${Destination_Action} = 6]?MissCall,1)
same => n,GoToIf($[${Destination_Action} = 7]?Conference,1)
same => n,GoToIf($[${Destination_Action} = 9]?SipExtension,1)
same => n,GoToIf($[${Destination_Action} = 10]?OutboundQueue,1)
same => n,GOTO(s,HangME)

exten => OutboundQueue,1,NoOP(Enter in Outbound Queue)
same => n,Set(LastLocation=OutboundQueue)
same => n,Set(OutboundQueueInformation=${SHELL(curl "${US4GROUP_GetOutboundQueueInfo}OutboundQueueID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,OutboundQueueName,QueueTimeout,CLI,MemberCount,QueueMembersList)=${OutboundQueueInformation})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?HangME)
same => n,Set(MemberIndex=1)
same => n,ExecIf($["${MemberCount}" = "1"]?Set(DialingNumber=${QueueMembersList}))
same => n,GoToIf($["${MemberCount}" = "1"]?DialNumber)
same => n(GetNumber),GOSub(GetQueueMember,1)
same => n(DialNumber),GOSub(DialQueueMember,1)
same => n,GoToIf($["${DIALSTATUS}" != "ANSWER"]?GetNumber)
same => n(HangME),HangUP()

exten => GetQueueMember,1,NoOP(MemberIndex ${MemberIndex} MemberCount ${MemberCount} QueueMembersList ${QueueMembersList})
same => n,GoToIf($[${MemberIndex} > ${MemberCount}]?OutboundQueue,HangME)
same => n,Set(DialingNumber=${CUT(QueueMembersList,&,${MemberIndex})})
same => n,Return

exten => DialQueueMember,1,NoOP(Dialing ${DialingNumber})
same => n,Set(MemberIndex=$[${MemberIndex}+1])
same => n,Set(CALLERID(number)=${CLI})
same => n,Dial(${DialingNumber},45,tTm)
same => n,Return


exten => TimeCondition,1,NOOP(Destination Action :: ${Destination_Action} :: Destination Value ::${Destination_Value} ${US4GROUP_CheckTimeCondition}TimeConditionID=${Destination_Value}&UserID=${UserID})
same => n,Set(LastLocation=TimeCondition)
same => n,Set(TimeConditionInformation=${SHELL(curl "${US4GROUP_CheckTimeCondition}TimeConditionID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,Destination_Action,Destination_Value)=${TimeConditionInformation})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?hang)
same => n,GOTO(WhereToGO,1)
same => n(hang),HangUp()

exten => SipExtension,1,Set(ExtensionInformation=${SHELL(curl "${US4GROUP_GetExtensionDetail}ExtensionID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(LastLocation=SipExtension)
same => n,Set(NOW=${EPOCH})
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
same => n,Set(ARRAY(CallStatus,CallCause,ExtensionNumber,ExtensionTimeout)=${ExtensionInformation})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?hang)
same => n,Set(RecName=${UserID}/${YEAR}-${MONTH}/${DAY}/Incoming/Extension/${ExtensionNumber}/${Caller}-${ExtensionNumber}-${CallStartTime}-${UserID}-${CDRID}-${UNIQUEID}-Extension)
same => n,Set(AgentNumber=${ExtensionNumber})
same => n,Set(AgentCallStartTime=${EPOCH})
same => n,MixMonitor(${RecPath}${RecName}.wav,b)
same => n,Dial(SIP/${ExtensionNumber},${ExtensionTimeout},tTU(InAnswerTime^${CDRID}))
same => n,Hangup()
same => n,NoOP(${GOSUB_RETVAL})
same => n(hang),HangUp()

exten => DialExtension,1,Set(LastLocation=Dialing Extension ${ARG1} ${ARG2})
same => n,Set(ExtensionDialStatus=NOTDIAL)
same => n,Set(ExtensionStatus=${DEVICE_STATE(SIP/${ARG1})})
same => n,ExecIf($["${ExtensionStatus}" = "NOT_INUSE"]?Dial(SIP/${ARG1},${ARG2},Fg):GOTO(ReturnMe))
same => n,Set(ExtensionDialStatus=${DIALSTATUS})
same => n(ReturnMe),Return(${ExtensionDialStatus})

exten => IVR,1,NOOP(Destination Action :: ${Destination_Action} :: Destination Value ::${Destination_Value})
same => n,Set(IVRInformation=${SHELL(curl "${US4GROUP_GetIVRDetail}IvrID=${Destination_Value}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,IVRID,IVRTYPE,WelcomeGreeting,DefaultDestinationType,DefaultDestinationAction,ValidInputs,TimeOut,NoInputAnnouncementID,NoInputRetryCount,NoInputMaxReachAnnouncementID,NoInputDestinationAction,NoInputDestinationValue,InvalidAnnounceMentID,InvalidRetryCount,InvalidMaxReachAnnouncementID,InvalidDestinationAction,InvalidDestinationValue)=${IVRInformation})
same => n,GoToIf($[${IVRTYPE} = 0]?NormalIVR,1:DTMFIVR,1)


exten => NormalIVR,1,GoSub(PlayFile,1(${WelcomeGreeting}))
same => n,Set(LastLocation=NormalIVR)
same => n,Set(Destination_Action=${DefaultDestinationType})
same => n,Set(Destination_Value=${DefaultDestinationAction})
same => n,GOTO(WhereToGO,1)


exten => PlayFile,1,Set(FileToPlay=${SHELL(curl "${US4GROUP_GetSoundFile}UserID=${UserID}&SoundID=${ARG1}")})
same => n,Set(FileToPlay=${SHELL(curl "${US4GROUP_GetSoundFile}UserID=${UserID}&SoundID=${ARG1}")})
same => n,ExecIf($["${FileToPlay}" = "NA"]?Set(FileToPlayExist=0):Set(FileToPlayExist=1))
same => n,ExecIf($[${FileToPlayExist} = 1]?PlayBack(${FileToPlay}))
same => n,Return()

exten => SoundFilePath,1,Set(FileToPlay=${SHELL(curl "${US4GROUP_GetSoundFile}UserID=${ARG2}&SoundID=${ARG1}")})
same => n,Set(FileToPlay=${SHELL(curl "${US4GROUP_GetSoundFile}UserID=${ARG2}&SoundID=${ARG1}")})
same => n,ExecIf($["${FileToPlay}" = "NA"]?Set(FileToPlayExist=0):Set(FileToPlayExist=1))
same => n,Return(${FileToPlayExist},${FileToPlay})

exten => DTMFIVR,1,GoSub(SoundFilePath,1(${WelcomeGreeting},${UserID}))
same => n,Set(LastLocation=DTMFIVR)
same => n,GoToIf($[${FileToPlayExist} = 1]?Continue)
same => n,Set(Destination_Action=${NoInputDestinationAction})
same => n,Set(Destination_Value=${NoInputDestinationValue})
same => n,GOTO(WhereToGO,1)
same => n(Continue),Read(PressedInput,${FileToPlay},1,,,${TimeOut})
same => n,GoToIf($["${PressedInput}" = ""]?NOINPUT,1)
same => n,Set(IsValidDigitPressed=${REGEX('"${PressedInput}" ${ValidInputs}')})
same => n,GoToIf($[${IsValidDigitPressed}=0]?INVALIDINPUT,1)
same => n,Set(ExtensionDetail=${SHELL(curl "${US4GROUP_GetIVRDetailFromExtension}IVRID=${Destination_Value}&Extension=${PressedInput}&UserID=${UserID}")})
same => n,Set(ARRAY(CallStatus,CallCause,Destination_Action,Destination_Value)=${ExtensionDetail})
same => n,GOTO(WhereToGO,1)


exten => NOINPUT,1,NoOp()
same => n,GoToIf($[${NoInputRetryCount} = 0]?NOINPUTMAX,1)
same => n,GoSub(PlayFile,1(${NoInputAnnouncementID}))
same => n,Set(NoInputRetryCount=$[${NoInputRetryCount}-1])
same => n,GoTo(DTMFIVR,1)
same => n(hang),HangUp()

exten => NOINPUTMAX,1,NoOp()
same => n,GoSub(PlayFile,1(${NoInputMaxReachAnnouncementID}))
same => n,Set(Destination_Action=${NoInputDestinationAction})
same => n,Set(Destination_Value=${NoInputDestinationValue})
same => n,GOTO(WhereToGO,1)

exten => INVALIDINPUT,1,NoOp()
same => n,GoToIf($[${InvalidRetryCount} = 0]?INVALIDINPUTMAX,1)
same => n,GoSub(PlayFile,1(${InvalidAnnounceMentID}))
same => n,Set(InvalidRetryCount=$[${InvalidRetryCount}-1])
same => n,GoTo(DTMFIVR,1)
same => n(hang),HangUp()

exten => INVALIDINPUTMAX,1,NoOp()
same => n,GoSub(PlayFile,1(${InvalidMaxReachAnnouncementID}))
same => n,Set(Destination_Action=${InvalidDestinationAction})
same => n,Set(Destination_Value=${InvalidDestinationValue})
same => n,GOTO(WhereToGO,1)

exten => Conference,1,NoOP(Enter in conference)
same => n,Set(LastLocation=Conference)
same => n,GoSub(GetConferenceDetail,1(${Destination_Value},${UserID}))
same => n,Set(ARRAY(CallStatus,CallCause,ConferenceName,ConferenceType,Announcement,RecordConference,MaxParticipants,MaxParticipantsAnnouncement,PinNumber,TimeOut,MaxAttempt,InvalidPinAnnouncement,PinNumberLength)=${GOSUB_RETVAL})
same => n,GoToIf($["${CallStatus}" = "HANGUP"]?HangME)
same => n,GoToIf($["${ConferenceType}" = "1"]?PinBasedConference,1:NormalConference,1)
same => n(HangME),HANGUP()


exten => GetConferenceDetail,1,NoOP(ARG1 ${ARG1})
same => n,Set(ConferenceInformation=${SHELL(curl "${US4GROUP_GetConferenceDetail}ConferenceID=${ARG1}&UserID=${ARG2}")})
same => n,Return(${ConferenceInformation})

exten => NormalConference,1,NoOP(Normal Conference)
same => n,GoSub(PlayFile,1(${Announcement}))
same => n,GOTO(PlayConference,1)

exten => PinBasedConference,1,NoOP(Enter in PinBased Conference PIN Number ${PinNumber})
same => n,GoSub(SoundFilePath,1(${Announcement},${UserID}))
same => n,Set(LastLocation=DTMFIVR)
same => n,Set(ARRAY(FileToPlayExist,FileToPlay)=${GOSUB_RETVAL})
same => n,GoToIf($[${FileToPlayExist} != 1]?HangME)
same => n,Read(PressedInput,${FileToPlay},${PinNumberLength},,,${TimeOut})
same => n,GoToIf($["${PressedInput}" = ""]?INVALIDINPUT_CONFERENCE,1)
same => n,GoToIf($[${PressedInput} != ${PinNumber}]?INVALIDINPUT_CONFERENCE,1)
same => n,GOTO(PlayConference,1)
same => n(HangME),HangUP()

exten => INVALIDINPUT_CONFERENCE,1,NoOp(MaxAttempt ${MaxAttempt})
same => n,GoToIf($[${MaxAttempt} = 0]?HangME)
same => n,GoSub(PlayFile,1(${InvalidPinAnnouncement}))
same => n,Set(MaxAttempt=$[${MaxAttempt}-1])
same => n,GoTo(PinBasedConference,1)
same => n(HangME),HangUp()

exten => PlayConference,1,NoOP(Enter in Play Conference)
same => n,GoToIf($[${CONFBRIDGE_INFO(parties,${Destination_Value})} >= ${MaxParticipants}]?MaxParticipantsReach,1)
same => n,GoToIf($[${RecordConference} != 1]?ComeHere)
same => n,Set(RecName=${Caller}-${CallStartTime}-${UserID}-${CDRID}-${UNIQUEID})
same => n,Set(CONFBRIDGE(bridge,record_conference)=yes)
same => n,Set(CONFBRIDGE(bridge,record_file)=${RecPath}/${RecName}.wav)
same => n(ComeHere),Set(CONFBRIDGE(user,template)=default_user)
same => n,Set(CONFBRIDGE(user,announce_join_leave)=yes)
same => n,ConfBridge(${Destination_Value})
same => n,HangUP()



exten => MaxParticipantsReach,1,NoOp()
same => n,GoSub(PlayFile,1(${MaxParticipantsAnnouncement}))
same => n,HangUP()

exten => callstatus,1,NoOP(Hang)
same  => n,Set(AgentStatus=${DB(Incoming/Status.${CDRID})})
same  => n,ExecIf($["${AgentStatus}"="ANSWER"]?Set(AgentAnswerTime=${DB(Incoming/AnswerTime.${CDRID})}):Set(AgentAnswerTime=0))
same  => n,Set(HANGUPCAUSE_STRING=${HANGUPCAUSE_KEYS()})
same  => n,Goto(deletedbvalue)
same  => n(startme),NoOp()
same  => n,Verbose(0, Channels with hangup cause information: ${HANGUPCAUSE_STRING}  ${LEN(${HANGUPCAUSE_STRING})}) 
same  => n,GotoIf($[${LEN(${HANGUPCAUSE_STRING})}=0]?endme)
same  => n,Set(ARRAY(item)=${HANGUPCAUSE_STRING})
same  => n,Verbose(0, Array Item is : ${item}  and length is  ${LEN(${item})}) 
same  => n,Set(HANGUPCAUSE_STRING=${HANGUPCAUSE_STRING:${LEN(${item})}})
same  => n,ExecIf($["${CustomerChannel}"="${item}"]?Set(CustomerHangupCause=${URIENCODE(${HANGUPCAUSE(${item},tech)}|${HANGUPCAUSE(${item},ast)})}):Set(AgentHangupCause=${URIENCODE(${HANGUPCAUSE(${item},tech)}|${HANGUPCAUSE(${item},ast)})}))
same  => n,Verbose(0, Got Channel ID ${item} with Technology Cause Code ${HANGUPCAUSE(${item},tech)}, Asterisk Cause Code ${HANGUPCAUSE(${item},ast)})
same  => n,GotoIf($[${LEN(${HANGUPCAUSE_STRING})}=0]?endme)
same  => n,Set(HANGUPCAUSE_STRING=${HANGUPCAUSE_STRING:1})
same  => n,Goto(startme)
same  => n(endme),NoOp()
same  => n(back),GoTo(returnback)
same  => n(deletedbvalue),NoOp()
same  => n,ExecIf($["${AgentStatus}"="ANSWER"]?NoOP(${DB_DELETE(Incoming/AnswerTime.${CDRID})}):NoOP())
same  => n,ExecIf($["${AgentStatus}"="ANSWER"]?NoOP(${DB_DELETE(Incoming/Status.${CDRID})}):Set(AgentStatus=NOANSWER)
same  => n,Goto(startme)
same  => n(returnback),Set(CallEndTime=${EPOCH})
same  => n,Set(APIValue=CallerDnid=${CallerDnid}&UserID=${UserID}&CustomerNumber=${Caller}&AgentNumber=${AgentNumber}&CDRID=${CDRID}&CallStartTime=${CallStartTime}&CallAnswerTime=${CallStartTime}&CallEndTime=${CallEndTime}&AgentStatus=${AgentStatus}&AgentHangupCause=${AgentHangupCause}&AgentCallStartTime=${AgentCallStartTime}&AgentCallAnswerTime=${AgentAnswerTime}&CustomerHangupCause=${CustomerHangupCause}&RecName=${URIENCODE(${RecName})}&LastDestination=${LastLocation}&Destination_Action=${Destination_Action}&Destination_Value=${Destination_Value}&FlowType=${FlowType}&DID=${DID}&CallerNumber=${CustomerNumber}&TransferStatus=${TransferStatus}&TransferAgent=${TransferAgent})
same => n,Set(InCallResponse=${SHELL(curl "${US4GROUP_SaveIncomingCallDetail}${APIValue}")})
same  => n,Return()

[TMain]
exten => _X.,1,NoOP(T MAIN)
;same => n,DumpChan()
same => n,Set(__TransferStatus=YES)
same => n,Set(__TransferAgent=${EXTEN})
same => n,Set(MainAgent=${CONNECTEDLINE(num)})
;same => n,Set(Destination_Value=${EXTEN})
same => n,Set(CallStartTime=${EPOCH})
same => n,NoOp((Destination Action :: ${Destination_Action} :: Destination Value ::${Destination_Value})
same => n,Set(LastLocation=Queue)
same => n,Set(NOW=${EPOCH})
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
same => n,Set(RecName=${TransferAgent}-${MainAgent}-${Caller}-${CallStartTime}-${UserID}-${CDRID}-${UNIQUEID}-Transfer) 
same => n,NoOP("${US4GROUP_TransferAgentOnCall}MainAgent=${MainAgent}&TransferAgent=${TransferAgent}&CDRID=${URIENCODE(${CDRID})}&TransferRec=${URIENCODE(${RecName})}")
same => n,Set(AgentOnCallInformation=${SHELL(curl "${US4GROUP_TransferAgentOnCall}MainAgent=${MainAgent}&TransferAgent=${TransferAgent}&CDRID=${URIENCODE(${CDRID})}&TransferRec=${URIENCODE(${RecName})}")})
same => n,Set(RecFileWithPath=${RecPath}${UserID}/${YEAR}-${MONTH}/${DAY}/Transfer/${RecName})
same => n,MixMonitor(${RecFileWithPath}.wav,b)
same => n,AgentRequest(${TransferAgent})
same => n,NoOP(${AGENT_STATUS})
same => n(HangME),HangUP()

[AgentLogin]
exten => s,1,NoOP(Agent ${AgentNumber} Request For Login)
same => n,Answer()
same => n,Set(AgentStatus=LoginInitiated)
same => n,Set(AgentInformation=${SHELL(curl "${US4GROUP_AgentLogin}AgentID=${AgentNumber}&AgentStatus=${AgentStatus}")})
same => n,Set(ARRAY(CallStatus,CallCause)=${AgentInformation})
same => n,Set(CHANNEL(dtmf_features)=HT)
same => n,Authenticate(${AgentPassword})
same => n,Set(AgentStatus=LoginCompleted)
same => n,AgentLogin(${AgentNumber})
same => n,NoOP(Agent Status:: ${AGENT_STATUS})
same => n,Hangup()

exten => callstatus,1,NoOP(Agent ${AgentNumber} Hang UP)
same => n,NoOP(Agent Status:: ${AGENT_STATUS})
same => n,NoOP("${AgentStatus}"!="LoginInitiated")
same => n,GoToIf($["${AgentStatus}" = "LoginCompleted"]?HangME)
same => n,Set(AgentHangupStatus=${SHELL(curl "${US4GROUP_AgentLogout}AgentID=${AgentNumber}&AgentStatus=LoginFailed")})
same => n(HangME),Hangup()

exten => _9.,1,GoSub(US4GROUP,DialExtension,1(${EXTEN:1},45))
exten => _1.,1,GoSub(transfer_to_agents,${EXTEN:1},1)



[SendResponse]
exten => s,1,NoOP()
;same => n,DumpChan()
same => n,Set(CallerNumber=${URIENCODE(${CONNECTEDLINE(num)})})
same => n,Set(AgentID=${URIENCODE(${CHANNEL})})
same => n,Set(CHANNEL(dtmf_features)=HT)
same => n,NoOP(${US4GROUP_AgentOnCall}AgentID=${AgentNumber}&CallerNumber=${CallerNumber})
same => n,Set(AgentOnCallInformation=${SHELL(curl "${US4GROUP_AgentOnCall}AgentID=${AgentID}&CallerNumber=${CallerNumber}&CustomerChannel=${URIENCODE(${CustomerChannel})}")})
same => n,Return()

[SendDTMF]
exten => s,1,NoOP("Sending DTMF ${AgentChannel} ${DTMF} ${Prefix}")
same => n,Answer()
;same => n,SendDTMF(${Prefix}ww${DTMF},,,${AgentChannel})
same => n,SendDTMF(${Prefix},,,${AgentChannel})
;same => n,Wait(5)
;same => n,SendDTMF(${DTMF},,,${AgentChannel})
same => n,HangUP()

[DialAgent]
exten => s,1,NoOP(AgentDial)
same => n,Answer()

[DialManualAgent]
exten => s,1,NoOP(AgentDial)
;same => n,DumpChan()
;same => n,Answer()
same => n,AgentRequest(${AgentNumber})
same => n,NoOP(${AGENT_STATUS})
same => n,NoOP(Agent Hangup)
same => n,HangUP()

[ManualCallByAgent]
exten => s,1,Answer()
same => n,Set(NOW=${EPOCH})
same => n,Set(CID=${Name})
;same => n,DumpChan()
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
same => n,Set(AgentChannelID=${AgentChannelID})
same => n,Set(AgentStatus=ANSWER)
same => n,Set(CallStartTime=${CallStartTime})
same => n,Set(HangupHandler=1)
same => n,Set(RecName=${UserID}/${YEAR}-${MONTH}/${DAY}/Manual/${AgentNumber}/${AgentNumber}-${CustomerNumber}-${CallStartTime}-${UserID}-${AgentChannelID})
same => n,Set(RecPath=${RecPath})
same => n,Set(CHANNEL(dtmf_features)=H)
same => n,Set(CALLERID(number)=${CallerID})
same => n,Set(HangUpBy=Agent)
same => n,Set(DB(ManualCallByAgent/CustomerStatus.${CDRID})=NOANSWER)
same => n,MixMonitor(${RecPath}${RecName}.wav,b)
same => n,Set(DialOption=tTb(ManualCallByAgent^CustomerChannel^1(${AgentNumber}))U(GetDialAnswerTime^${CDRID}))
same => n,Set(SIPSTATUS=${DEVICE_STATE(SIP/${CustomerNumber:1})})
same => n,GotoIf($["${SIPSTATUS}"}="INVALID"]?DialMobileNumber)
same => n,Dial(SIP/${CustomerNumber:1},45,${DialOption})
same => n,GoTO(resume_me)
same => n(DialMobileNumber),Dial(SIP/${OutboundTrunkName}/${CustomerNumber},45,${DialOption})
;same => n,Dial(SIP/1006,45,${DialOption})
same => n(resume_me),Set(HangUpBy=Customer)
same => n,NoOP(Dialstatus=${DIALSTATUS})
same => n,HangUP()

exten => CustomerChannel,1,NoOP(Agent Number ${ARG1} Dialing Channel ${CHANNEL})
same => n,Set(APIValue=AgentNumber=${ARG1}&CustomerChannel=${URIENCODE(${CHANNEL}))
same => n,Set(CURL_RESULT=${CURL(${US4GROUP_SaveManualCallCustomerChannel}${APIValue})})
same => n,Return()

exten => callstatus,1,NoOP()
same  => n,GoToIf($["${HangupHandler}" = "1"]?continue)
same  => n,Set(AgentChannelID=${AgentChannelID})
same  => n,Set(HangupHandler=0)
same  => n,Set(AgentStatus=NOANSWER)
same  => n,Set(CallStatus=NOANSWER)
same  => n,Set(DB(ManualCallByAgent/CustomerStatus.${CDRID})=NODIAL)
same  => n(continue),NoOp()
same  => n,Set(CustomerStatus=${DB(ManualCallByAgent/CustomerStatus.${CDRID})})
same  => n,ExecIf($["${CustomerStatus}"="ANSWER"]?Set(CustomerAnswerTime=${DB(ManualCallByAgent/DialAnswerTime.${CDRID})}):Set(CustomerAnswerTime=0))
same  => n,ExecIf($["${AgentStatus}"="ANSWER"]?NoOP():Set(AgentCallAnswerTime=0))
same  => n,Set(CustomerChannelID=${DIALEDPEERNAME})
same  => n,Set(HANGUPCAUSE_STRING=${HANGUPCAUSE_KEYS()})
same  => n,Goto(deletedbvalue)
same  => n(startme),NoOp()
same  => n,Verbose(0, Channels with hangup cause information: ${HANGUPCAUSE_STRING}  ${LEN(${HANGUPCAUSE_STRING})}) 
same  => n,GotoIf($[${LEN(${HANGUPCAUSE_STRING})}=0]?endme)
same  => n,Set(ARRAY(item)=${HANGUPCAUSE_STRING})
same  => n,Verbose(0, Array Item is : ${item}  and length is  ${LEN(${item})}) 
same  => n,Set(HANGUPCAUSE_STRING=${HANGUPCAUSE_STRING:${LEN(${item})}})
same  => n,ExecIf($["${AgentChannelID}"="${item}"]?Set(AgentHangupCause=${URIENCODE(${HANGUPCAUSE(${item},tech)}|${HANGUPCAUSE(${item},ast)})}):Set(CustomerHangupCause=${URIENCODE(${HANGUPCAUSE(${item},tech)}|${HANGUPCAUSE(${item},ast)})}))
same  => n,Verbose(0, Got Channel ID ${item} with Technology Cause Code ${HANGUPCAUSE(${item},tech)}, Asterisk Cause Code ${HANGUPCAUSE(${item},ast)})
same  => n,GotoIf($[${LEN(${HANGUPCAUSE_STRING})}=0]?endme)
same  => n,Set(HANGUPCAUSE_STRING=${HANGUPCAUSE_STRING:1})
same  => n,Goto(startme)
same  => n(endme),NoOp()
same  => n(back),GoTo(returnback)
same  => n(deletedbvalue),NoOp()
same  => n,NoOP(${DB_DELETE(ManualCallByAgent/CustomerStatus.${CDRID})})
same  => n,ExecIf($["${CustomerStatus}"="ANSWER"]?NoOP(${DB_DELETE(ManualCallByAgent/DialAnswerTime.${CDRID})}):NoOP())
same  => n,Goto(startme)
same  => n(returnback),Set(CallEndTime=${EPOCH})
same  => n,Set(APIValue=CustomerNumber=${CustomerNumber}&AgentNumber=${AgentNumber}&CDRID=${CDRID}&CallStatus=${CallStatus}&CallStartTime=${CallStartTime}&CallAnswerTime=${CallAnswerTime}&CallEndTime=${CallEndTime}&AgentStatus=${AgentStatus}&AgentHangupCause=${AgentHangupCause}&CustomerStatus=${CustomerStatus}&CallAnswerTime=${CustomerAnswerTime}&CustomerHangupCause=${CustomerHangupCause}&HangUpBy=${HangUpBy}&RecName=${URIENCODE(${RecName})})
same  => n,Set(CURL_RESULT=${CURL(${US4GROUP_SaveManualCallDetail}${APIValue})})
same  => n,Return()

[GetDialAnswerTime]
exten => s,1,Set(DB(ManualCallByAgent/DialAnswerTime.${ARG1})=${EPOCH})
exten => s,n,Set(DB(ManualCallByAgent/CustomerStatus.${ARG1})=ANSWER)
exten => s,n,Return

[ManualCallByExtension]
exten => _X.,1,NoOP(CalledNumber=${EXTEN})
same => n,Noop(BLINDTR = ${BLINDTRANSFER})
same => n,ExecIf($[${LEN(${BLINDTRANSFER})} > 0]?Set(TransferNumber=${EXTEN}))
same => n,ExecIf($[${LEN(${BLINDTRANSFER})} > 0]?Set(TransferAttempt=1))
same => n,ExecIf($[${LEN(${TransferType})} > 0]?Set(TransferType=1))
same => n,GotoIf($[${LEN(${BLINDTRANSFER})} > 0]?BLINDTRANSFER,1) 
same => n,Set(CalledNumber=${EXTEN})
same => n,Set(TransferNumber=0)
same => n,Set(TransferAttempt=0)
same => n,Set(TransferType=0)
same => n,Set(TransferDialStatus=NODIAL)
same => n,GoTo(s,1)
exten => s,1,Set(ExtensionNumber=${CALLERID(number)})
same => n,Set(NOW=${EPOCH})
same => n,Set(__DAY=${STRFTIME(${NOW},,%d)})
same => n,Set(__MONTH=${STRFTIME(${NOW},,%m)})
same => n,Set(__YEAR=${STRFTIME(${NOW},,%Y)})
;same => n,Set(CalledNumber=${CALLERID(DNID)})
same => n,Answer()
same => n,Set(CHANNEL(hangup_handler_push)=callstatus,1)
same => n,Set(ExtensionChannelID=${CHANNEL})
same => n,Set(CallStartTime=${EPOCH})
same => n,Set(ARRAY(AdminID,CallerID,OutboundTrunkName)=${CURL(${US4GROUP_GetExtensionInformation}ExtensionNumber=${ExtensionNumber})})
same => n,Set(MyUniqueID=${ExtensionNumber}${CalledNumber}${CallStartTime})
same => n,Set(RecName=${AdminID}/${YEAR}-${MONTH}/${DAY}/Manual/Extension/${ExtensionNumber}/${ExtensionNumber}-${CalledNumber}-${CallStartTime}-${AdminID}-${ExtensionChannelID})
same => n,Set(SIPSTATUS=${DEVICE_STATE(SIP/${CalledNumber})})
same => n,GotoIf($["${SIPSTATUS}"}="INVALID"]?DialMobileNumber,1)
same => n,GotoIf($["${SIPSTATUS}"}="NOT_INUSE""]?DialExtension,1)
same => n,Hangup()

exten => BLINDTRANSFER,1,NOOP(BLINDTR = ${BLINDTRANSFER})
same => n,Set(ExtensionNumber=${CALLERID(number)})
same => n,Set(ARRAY(AdminID,CallerID,OutboundTrunkName)=${CURL(${US4GROUP_GetExtensionInformation}ExtensionNumber=${ExtensionNumber})})
same => n,Set(SIPSTATUS=${DEVICE_STATE(SIP/${TransferNumber})})
same => n,GotoIf($["${SIPSTATUS}"}="INVALID"]?DialTransferMobileNumber,1)
same => n,GotoIf($["${SIPSTATUS}"}="NOT_INUSE""]?DialTransferExtension,1)

exten => DialTransferExtension,1,NoOP(Transfer Extension Dial ${TransferNumber})
same => n,Dial(SIP/${TransferNumber},45,tTgF)
same => n,Set(TransferDialStatus=${DIALSTATUS})
same => n,HangUP()

exten => DialTransferMobileNumber,1,NoOP(Extension Dial ${TransferNumber})
same => n,Set(CALLERID(number)=${CallerID})
same => n,Dial(SIP/${OutboundTrunkName}/${TransferNumber},45,tTgF)
same => n,Set(TransferDialStatus=${DIALSTATUS})
same => n,HangUP()

exten => DialExtension,1,NoOP(Extension Dial ${CalledNumber})
same => n,MixMonitor(${RecPath}${RecName}.wav,b)
same => n,Dial(SIP/${CalledNumber},45,tTU(ManualCallByExtensionAnswerTime^${MyUniqueID}))

exten => DialMobileNumber,1,NoOP(Extension Dial ${CalledNumber})
same => n,Set(CALLERID(number)=${CallerID})
same => n,MixMonitor(${RecPath}${RecName}.wav,b)
same => n,Dial(SIP/${OutboundTrunkName}/${CalledNumber},45,tTU(ManualCallByExtensionAnswerTime^${MyUniqueID}))

exten => callstatus,1,Noop(Channel Hangup ${CHANNEL})
same => n,Set(CallEndTime=${EPOCH})
same => n,ExecIf($["${DIALSTATUS}"="ANSWER"]?Set(AnswerTime=${DB(ManualCallByExtension/AnswerTime.${MyUniqueID})}):Set(AnswerTime=0))
same => n,NoOP(${DB_DELETE(ManualCallByExtension/AnswerTime.${MyUniqueID})})
same => n,Set(APIValue=ExtensionNumber=${ExtensionNumber}&CalledNumber=${CalledNumber}&AdminID=${AdminID}&CallStatus=${DIALSTATUS}&CallStartTime=${CallStartTime}&CallAnswerTime=${AnswerTime}&CallEndTime=${CallEndTime}&RecName=${URIENCODE(${RecName})}&TransferAttempt=${URIENCODE(${TransferAttempt})}&TransferType=${URIENCODE(${TransferType})}&TransferStatus=${URIENCODE(${TransferStatus})}&TransferNumber=${URIENCODE(${TransferNumber})}&TransferDialStatus=${URIENCODE(${TransferDialStatus})})
same => n,Set(CURL_RESULT=${CURL(${US4GROUP_SaveExtensionCallDetail}${APIValue})})
same => n,HangUP()

