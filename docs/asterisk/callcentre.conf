; =============================================================================
; Call centre – single dialplan file (inbound, queue, extension, agent login)
; =============================================================================
; Put globals in extensions.conf [globals]. In extensions.conf add:
;   #include "callcentre.conf"
; Point trunk/DID to context "inbound". Agent login: ARI to context "AgentLogin".
; =============================================================================

[inbound]
exten => s,1,NoOp(Inbound call)
 same => n,Progress()
 same => n,Set(Caller=${FILTER(0-9,${CALLERID(num)})})
 same => n,Set(CallerDnid=${CALLERID(dnid)})
 same => n,Set(CDRID=${UNIQUEID})
 same => n,Set(CallStartTime=${EPOCH})
 same => n,Set(RouteResult=${SHELL(curl -s "${INBOUND_ROUTE}DID=${CallerDnid}&CallerNumber=${Caller}&CallUniqueID=${UNIQUEID}")})
 same => n,Set(ARRAY(CallStatus,Destination_Action,Destination_Value,UserID,CDRID)=${RouteResult})
 same => n,GotoIf($["${CallStatus}" = "HANGUP"]?inbound,HangME)
 same => n,Set(TIMEOUT(absolute)=7200)
 same => n,Set(CHANNEL(hangup_handler_push)=callstatus,s,1)
 same => n,Answer()
 same => n,Goto(WhereToGO,s,1)
 same => n(HangME),Hangup()

exten => HangME,1,Hangup()

[WhereToGO]
exten => s,1,NoOp(WhereToGO Action=${Destination_Action} Value=${Destination_Value})
 same => n,GotoIf($[${Destination_Action} = 0]?inbound,s,HangME)
 same => n,GotoIf($[${Destination_Action} = 2]?Queue,s,1)
 same => n,GotoIf($[${Destination_Action} = 9]?SipExtension,s,1)
 same => n(HangME),Hangup()

; Queue: send customer to Stasis app; app picks agent by ring strategy (ringall, leastrecent, fewestcalls, random, rrmemory, rrordered, linear)
[Queue]
exten => s,1,NoOp(Queue ${Destination_Value})
 same => n,Set(QueueName=${Destination_Value})
 same => n,Stasis(queue-dashboard,${QueueName},${UNIQUEID})
 same => n,Hangup()

[SipExtension]
exten => s,1,NoOp(SipExtension ${Destination_Value})
 same => n,Gosub(ring-agent,s,1(${Destination_Value},Inbound))
 same => n,Hangup()

[callstatus]
exten => s,1,NoOp(Call hangup)
 same => n,Return()

[AgentLogin]
exten => s,1,NoOp(Agent ${AgentNumber} login)
 same => n,Set(CHANNEL(hangup_handler_push)=AgentLogin,callstatus,1)
 same => n,Answer()
 same => n,Set(AgentStatus=LoginInitiated)
 same => n,Set(AgentInformation=${SHELL(curl -s "${AGENT_LOGIN}AgentID=${AgentNumber}&AgentStatus=${AgentStatus}")})
 same => n,Set(CHANNEL(dtmf_features)=HT)
 same => n,Authenticate(${AgentPassword})
 same => n,Set(AgentStatus=LoginCompleted)
 same => n,AgentLogin(${AgentNumber})
 same => n,Set(AgentSuccess=${SHELL(curl -s "${AGENT_LOGIN_SUCCESS}AgentID=${AgentNumber}")})
 same => n,Hangup()

exten => callstatus,1,NoOp(Agent login hangup)
 same => n,GotoIf($["${AgentStatus}" = "LoginCompleted"]?HangME)
 same => n,Set(AgentHangupStatus=${SHELL(curl -s "${AGENT_LOGOUT}AgentID=${AgentNumber}&AgentStatus=LoginFailed")})
 same => n(HangME),Hangup()

; ----- Notify app: incoming (ringing), answered, hangup -----
[notify-incoming]
exten => s,1,NoOp(Notify incoming - Agent ${ARG4})
 same => n,Set(CURL_URL=${CALL_INCOMING}AgentID=${ARG4}&UniqueID=${ARG2}&ChannelID=${URIENCODE(${CHANNEL(name)})}&CustomerChannelID=${URIENCODE(${ARG1})}&CustomerNumber=${URIENCODE(${ARG3})}&QueueName=${URIENCODE(${ARG5})})
 same => n,Set(CURL_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${CURL_URL}")})
 same => n,Return()

[notify-answered]
exten => s,1,NoOp(Notify answered - UniqueID ${ARG1} Agent ${ARG2})
 same => n,Set(CURL_URL=${CALL_ANSWERED}AgentID=${ARG2}&UniqueID=${ARG1})
 same => n,Set(CURL_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${CURL_URL}")})
 same => n,Return()

[notify-hangup]
exten => s,1,NoOp(Notify hangup - UniqueID ${ARG1} Agent ${ARG2} Status ${ARG3})
 same => n,GotoIf($["${ARG3}" = ""]?setstatus)
 same => n,Set(PENDING_STATUS=${ARG3})
 same => n,Goto(url)
 same => n(setstatus),Set(PENDING_STATUS=completed)
 same => n(url),Set(CURL_URL=${CALL_HANGUP}UniqueID=${ARG1}&Status=${URIENCODE(${PENDING_STATUS})})
 same => n,GotoIf($["${ARG2}" = ""]?curl)
 same => n,Set(CURL_URL=${CURL_URL}&AgentID=${ARG2})
 same => n(curl),Set(CURL_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${CURL_URL}")})
 same => n,Return()

[ring-agent]
exten => s,1,NoOp(Ring agent ${ARG1} queue ${ARG2})
 same => n,Set(RING_AGENT_ID=${ARG1})
 same => n,Set(RING_QUEUE_NAME=${ARG2})
 same => n,Set(RING_UNIQUE_ID=${UNIQUEID})
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-customer,s,1)
 same => n,Dial(PJSIP/${ARG1},30,b(notify-incoming^s^1(${CHANNEL(name)}^${UNIQUEID}^${CALLERID(num)}^${ARG1}^${ARG2})),B(notify-answered^s^1(${UNIQUEID}^${ARG1})),e)
 same => n,Goto(ring-agent-${DIALSTATUS},1)

exten => h,1,NoOp(Customer hangup)
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},completed))
 same => n,Return()

exten => ring-agent-ANSWER,1,NoOp(Bridge ended)
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},completed))
 same => n,Hangup()

exten => ring-agent-NOANSWER,1,NoOp(No answer)
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},noanswer))
 same => n,Return()

exten => ring-agent-BUSY,1,NoOp(Busy)
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},busy))
 same => n,Return()

exten => ring-agent-CHANUNAVAIL,1,NoOp(Channel unavailable)
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},failed))
 same => n,Return()

exten => _ring-agent-.,1,NoOp(Dial status ${DIALSTATUS})
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},${DIALSTATUS}))
 same => n,Return()

[hangup-customer]
exten => s,1,NoOp(Hangup handler)
 same => n,Gosub(notify-hangup,s,1(${RING_UNIQUE_ID},${RING_AGENT_ID},completed))
 same => n,Return()

; Trunk sends DID as extension; use this context if your trunk points to "from-trunk"
[from-trunk]
exten => _X.,1,NoOp(Call from trunk ${EXTEN})
 same => n,Set(CALLERID(dnid)=${EXTEN})
 same => n,Goto(inbound,s,1)

[from-pstn]
exten => _X.,1,NoOp(Call from trunk ${EXTEN})
 same => n,Set(CALLERID(dnid)=${EXTEN})
 same => n,Goto(inbound,s,1)

[from-internal]
exten => _9.,1,NoOp(Internal outbound ${EXTEN:1})
 same => n,Goto(from-pstn,${EXTEN:1},1)
