; =============================================================================
; Phase 3: Real-time call handling – globals (add to [globals] in extensions.conf)
; =============================================================================
; Add these lines to the [globals] section of your extensions.conf.
; Replace http://YOUR_APP_HOST:3001 with your Node app URL (Asterisk must reach it).
;
; APIURL=http://YOUR_APP_HOST:3001/api/asterisk/
; PHASE3_INCOMING_CALL=${APIURL}IncomingCall?
; PHASE3_CALL_ANSWERED=${APIURL}CallAnswered?
; PHASE3_CALL_HANGUP=${APIURL}CallHangup?
; PHASE3_RECORDING=${APIURL}Recording?

