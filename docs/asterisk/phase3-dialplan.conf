; =============================================================================
; Phase 3: Real-time call handling – dialplan (include from extensions.conf)
; =============================================================================
; This file implements IncomingCall, CallAnswered, CallHangup (and optionally
; Recording) HTTP callbacks so the Node app can push events to the agent UI.
;
; Prerequisites:
;   - In [globals]: APIURL, PHASE3_INCOMING_CALL, PHASE3_CALL_ANSWERED,
;     PHASE3_CALL_HANGUP (and PHASE3_RECORDING if using recording callback).
;   - PJSIP or SIP endpoint for agents (e.g. PJSIP/1001 or SIP/1001).
;
; Usage:
;   To ring one agent with Phase 3 notifications from your inbound/queue flow:
;     Set(PHASE3_AGENT_ID=1001)
;     Set(PHASE3_QUEUE_NAME=Support)
;     Gosub(pbx-phase3-ring-one,s,1(${PHASE3_AGENT_ID},${PHASE3_QUEUE_NAME}))
;   The current channel must be the customer (inbound) leg.
; =============================================================================

; -----------------------------------------------------------------------------
; Subroutine (b): notify app when agent channel is created (ringing)
; Runs on B-leg. ARG1=customer_channel, ARG2=uniqueid, ARG3=caller_number, ARG4=agent_id, ARG5=queue_name, ARG6=campaign_name (optional), ARG7=DID/TFN (for reporting)
; Set PHASE3_CAMPAIGN_NAME before Gosub to pass campaign for agent display.
; -----------------------------------------------------------------------------
[pbx-phase3-incoming]
exten => s,1,NoOp(Phase3 IncomingCall notify - Agent ${ARG4})
 same => n,Set(PHASE3_URL=${PHASE3_INCOMING_CALL}AgentID=${ARG4}&UniqueID=${ARG2}&ChannelID=${URIENCODE(${CHANNEL(name)})}&CustomerChannelID=${URIENCODE(${ARG1})}&CustomerNumber=${URIENCODE(${ARG3})}&QueueName=${URIENCODE(${ARG5})}&CampaignName=${URIENCODE(${ARG6})}&DID=${URIENCODE(${ARG7})})
 same => n,Set(PHASE3_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${PHASE3_URL}")})
 same => n,Return()

; -----------------------------------------------------------------------------
; Subroutine (B): notify app when agent answers
; Runs on B-leg when answer. ARG1=customer_uniqueid, ARG2=agent_id
; -----------------------------------------------------------------------------
[pbx-phase3-answered]
exten => s,1,NoOp(Phase3 CallAnswered notify - UniqueID ${ARG1} Agent ${ARG2})
 same => n,Set(PHASE3_URL=${PHASE3_CALL_ANSWERED}AgentID=${ARG2}&UniqueID=${ARG1})
 same => n,Set(PHASE3_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${PHASE3_URL}")})
 same => n,Return()

; -----------------------------------------------------------------------------
; Subroutine: notify app on call hangup (caller hangup handler or after Dial)
; -----------------------------------------------------------------------------
[pbx-phase3-hangup]
exten => s,1,NoOp(Phase3 CallHangup notify - UniqueID ${ARG1} Agent ${ARG2} Status ${ARG3})
 same => n,GotoIf($["${ARG3}" = ""]?setstatus)
 same => n,Set(PHASE3_STATUS=${ARG3})
 same => n,Goto(url)
 same => n(setstatus),Set(PHASE3_STATUS=completed)
 same => n(url),Set(PHASE3_URL=${PHASE3_CALL_HANGUP}UniqueID=${ARG1}&Status=${URIENCODE(${PHASE3_STATUS})})
 same => n,GotoIf($["${ARG2}" = ""]?curl)
 same => n,Set(PHASE3_URL=${PHASE3_URL}&AgentID=${ARG2})
 same => n(curl),Set(PHASE3_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${PHASE3_URL}")})
 same => n,Return()

; -----------------------------------------------------------------------------
; Main context: ring one agent with Phase 3 callbacks
; Entry: Gosub(pbx-phase3-ring-one,s,1(agent_id,queue_name))
;   agent_id  = extension number (e.g. 1001) – must match PJSIP/SIP endpoint
;   queue_name = optional queue name for display (e.g. Support)
;   Set PHASE3_CAMPAIGN_NAME before Gosub to pass campaign name to agent UI.
; Current channel = customer leg. Uses PJSIP by default; change to SIP if needed.
; -----------------------------------------------------------------------------
[pbx-phase3-ring-one]
exten => s,1,NoOp(Phase3 ring agent ${ARG1} queue ${ARG2})
 same => n,Set(PHASE3_AGENT_ID=${ARG1})
 same => n,Set(PHASE3_QUEUE_NAME=${ARG2})
 same => n,Set(PHASE3_UNIQUE_ID=${UNIQUEID})
 same => n,Set(CHANNEL(hangup_handler_push)=pbx-phase3-hangup-customer,1)
 same => n,Dial(PJSIP/${ARG1},30,b(pbx-phase3-incoming^s^1(${CHANNEL(name)}^${UNIQUEID}^${CALLERID(num)}^${ARG1}^${ARG2}^${PHASE3_CAMPAIGN_NAME}^${CallerDnid})),B(pbx-phase3-answered^s^1(${UNIQUEID}^${ARG1})),e)
 same => n,Goto(pbx-phase3-dial-${DIALSTATUS},1)

; Customer hung up during ring or talk
exten => h,1,NoOp(Phase3 customer hangup)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},completed))
 same => n,Return()

; After Dial: bridge ended (agent or customer hung up)
exten => pbx-phase3-dial-ANSWER,1,NoOp(Phase3 bridge ended - call completed)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},completed))
 same => n,Hangup()

exten => pbx-phase3-dial-NOANSWER,1,NoOp(Phase3 agent no answer)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},noanswer))
 same => n,Return()

exten => pbx-phase3-dial-BUSY,1,NoOp(Phase3 agent busy)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},busy))
 same => n,Return()

exten => pbx-phase3-dial-CHANUNAVAIL,1,NoOp(Phase3 channel unavailable)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},failed))
 same => n,Return()

exten => _pbx-phase3-dial-.,1,NoOp(Phase3 dial status ${DIALSTATUS})
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},${DIALSTATUS}))
 same => n,Return()

; Hangup handler for customer channel (so we notify when customer hangs up)
[pbx-phase3-hangup-customer]
exten => s,1,NoOp(Phase3 hangup handler - customer channel)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},completed))
 same => n,Return()

; =============================================================================
; Optional: use from Queue() via Local channel
; =============================================================================
; If you use Queue() and want Phase 3 only when a specific agent answers, you
; can't easily inject IncomingCall before each ring. Alternative: replace
; Queue() with a loop that tries each member using pbx-phase3-ring-one.
; Example (pseudo): try agent 1001, if no answer try 1002, etc.
; =============================================================================

; =============================================================================
; Optional: Recording callback (after MixMonitor or Record)
; =============================================================================
; When a recording file is ready, call from dialplan or an external script:
;   curl "${PHASE3_RECORDING}UniqueID=...&Path=/path/to/recording.wav"
; Or in dialplan after MixMonitor (e.g. in h extension or after Hangup):
;   Set(PHASE3_REC_PATH=${URIENCODE(${RECORDED_FILE})})
;   Set(PHASE3_REC_RESULT=${SHELL(curl -s "${PHASE3_RECORDING}UniqueID=${UNIQUEID}&Path=${PHASE3_REC_PATH}")})
; =============================================================================
