; =============================================================================
; Phase 3: Example – inbound call to a single extension (with CDR + realtime)
; =============================================================================
; Use this when your inbound route sends the call to one extension (e.g. 1001)
; instead of a queue. Replace "Destination_Action = 9" / SipExtension handling
; with a jump to this context, or include this and call it from your main flow.
;
; Variables expected (set by your inbound/account check):
;   Destination_Value = extension number to ring (e.g. 1001), or set EXTEN
;   Caller, UNIQUEID, CDRID, UserID, etc. as in your existing flow
;   Optionally: QueueName (e.g. "Inbound") for display
; =============================================================================

[pbx-phase3-inbound-extension]
; Entry: extension in Destination_Value (or pass as argument)
; Current channel = customer (inbound call)
exten => _X.,1,NoOp(Phase3 inbound to extension ${EXTEN})
 same => n,Set(PHASE3_AGENT_EXT=${EXTEN})
 same => n,Set(PHASE3_QUEUE_NAME=Inbound)
 same => n,Gosub(pbx-phase3-ring-one,s,1(${PHASE3_AGENT_EXT},${PHASE3_QUEUE_NAME}))
 same => n,Return()

; Optional: entry point from your main context (e.g. after WhereToGO when Destination_Action=9)
; exten => s,1,Set(PHASE3_AGENT_EXT=${Destination_Value})
; same => n,Set(PHASE3_QUEUE_NAME=Inbound)
; same => n,Gosub(pbx-phase3-ring-one,s,1(${PHASE3_AGENT_EXT},${PHASE3_QUEUE_NAME}))
