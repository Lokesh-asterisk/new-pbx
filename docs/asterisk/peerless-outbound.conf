; =============================================================================
; Peerless outbound SIP trunk – VoIP provider 208.93.46.221
; =============================================================================
; Use for outbound calls only. Your inbound trunk (peerless_inbound) stays
; for incoming calls from the same provider.
;
; Include in pjsip.conf: #include "peerless-outbound.conf"
; Or merge the sections below into pjsip.conf / pjsip_trunks_custom.conf
;
; If your provider requires auth: set username/password in the [peerless_outbound]
; type=auth section below. When using the app DB sync, set password in config_json
; (SuperAdmin → SIP trunks → peerless_outbound) and run config sync.
; =============================================================================

[peerless_outbound]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw
allow=alaw
outbound_auth=peerless_outbound
aors=peerless_outbound

[peerless_outbound]
type=auth
auth_type=userpass
username=peerless_outbound
password=YOUR_PASSWORD_HERE
; realm=208.93.46.221

[peerless_outbound]
type=aor
contact=sip:208.93.46.221:5060

; Optional: if provider sends calls from this IP (e.g. callbacks), identify so they land in from-trunk
[peerless_outbound]
type=identify
endpoint=peerless_outbound
match=208.93.46.221
