; =============================================================================
; PBX Call Centre – full dialplan for new Node app (no us4group.conf)
; =============================================================================
; Paste this file into /etc/asterisk/ and in extensions.conf add:
;   #include "pbx-callcentre.conf"
;
; Or paste the entire contents into extensions.conf.
;
; Before use:
;   1. Set APIURL in [globals] to your Node app (e.g. http://10.50.7.181:3001/api/asterisk/)
;   2. Ensure inbound_routes, queues, queue_members, sip_extensions are set in the app DB
;   3. Point your trunk/DID to context "inbound" (e.g. from-pstn → Goto(inbound,s,1))
;   4. Agent SIP login: point ARI/originate to context "AgentLogin" with vars AgentNumber, AgentPassword
; =============================================================================

[globals]
; Node app base URL – change to your server (no trailing slash)
APIURL=http://YOUR_APP_HOST:3001/api/asterisk/

; Agent login (SIP login to dashboard)
US4GROUP_AgentLogin=${APIURL}US4GROUP_Agent/AgentLogin?
US4GROUP_AgentLogout=${APIURL}US4GROUP_Agent/AgentLogout?
US4GROUP_AgentLoginSuccess=${APIURL}US4GROUP_Agent/AgentLoginSuccess?

; Inbound route lookup (DID → queue or extension)
INBOUND_ROUTE=${APIURL}InboundRoute?
QUEUE_MEMBERS=${APIURL}QueueMembers?

; Phase 3 real-time call events
PHASE3_INCOMING_CALL=${APIURL}IncomingCall?
PHASE3_CALL_ANSWERED=${APIURL}CallAnswered?
PHASE3_CALL_HANGUP=${APIURL}CallHangup?
PHASE3_RECORDING=${APIURL}Recording?

; Recording path (optional; for MixMonitor)
; RecPath=/var/spool/asterisk/recording/

; =============================================================================
; INBOUND: entry from trunk / DID
; =============================================================================
[inbound]
exten => s,1,NoOp(Inbound call)
 same => n,Progress()
 same => n,Set(Caller=${FILTER(0-9,${CALLERID(num)})})
 same => n,Set(CallerDnid=${CALLERID(dnid)})
 same => n,Set(CDRID=${UNIQUEID})
 same => n,Set(CallStartTime=${EPOCH})
 same => n,Set(RouteResult=${SHELL(curl -s "${INBOUND_ROUTE}DID=${CallerDnid}&CallerNumber=${Caller}&CallUniqueID=${UNIQUEID}")})
 same => n,Set(ARRAY(CallStatus,Destination_Action,Destination_Value,UserID,CDRID)=${RouteResult})
 same => n,GotoIf($["${CallStatus}" = "HANGUP"]?inbound,HangME)
 same => n,Set(TIMEOUT(absolute)=7200)
 same => n,Set(CHANNEL(hangup_handler_push)=callstatus,1)
 same => n,Answer()
 same => n,Goto(WhereToGO,1)
 same => n(HangME),Hangup()

; =============================================================================
; Where to go (based on InboundRoute API)
; Destination_Action: 0=hangup, 2=queue, 9=extension
; =============================================================================
[WhereToGO]
exten => s,1,NoOp(WhereToGO Action=${Destination_Action} Value=${Destination_Value})
 same => n,GotoIf($[${Destination_Action} = 0]?inbound,HangME)
 same => n,GotoIf($[${Destination_Action} = 2]?Queue,1)
 same => n,GotoIf($[${Destination_Action} = 9]?SipExtension,1)
 same => n(HangME),Hangup()

; =============================================================================
; QUEUE: try agents in order (Phase 3). Gets member list from Node app.
; =============================================================================
[Queue]
exten => s,1,NoOp(Queue ${Destination_Value})
 same => n,Set(QueueName=${Destination_Value})
 same => n,Set(QueueMembersList=${SHELL(curl -s "${QUEUE_MEMBERS}QueueName=${QueueName}")})
 same => n,GotoIf($["${QueueMembersList}" = ""]?Queue,NoMembers)
 same => n,Set(MemberIndex=1)
 same => n(QueueTryNext),Set(MemberExten=${CUT(QueueMembersList,&,${MemberIndex})})
 same => n,GotoIf($["${MemberExten}" = ""]?Queue,NoAnswer)
 same => n,Gosub(pbx-phase3-ring-one,s,1(${MemberExten},${QueueName}))
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?Queue,Done)
 same => n,Set(MemberIndex=$[${MemberIndex} + 1])
 same => n,Goto(QueueTryNext)
 same => n(NoAnswer),NoOp(No queue member answered)
 same => n(Done),Hangup()
 same => n(NoMembers),NoOp(Queue has no members)
 same => n,Hangup()

; =============================================================================
; SIP EXTENSION: ring single extension (Phase 3)
; =============================================================================
[SipExtension]
exten => s,1,NoOp(SipExtension ${Destination_Value})
 same => n,Gosub(pbx-phase3-ring-one,s,1(${Destination_Value},Inbound))
 same => n,Hangup()

; =============================================================================
; Hangup handler (optional; Phase 3 already sends CallHangup in its flow)
; =============================================================================
[callstatus]
exten => s,1,NoOp(Call hangup)
 same => n,Return()

; =============================================================================
; AGENT LOGIN: SIP login to dashboard (ARI originates here with AgentNumber, AgentPassword)
; =============================================================================
[AgentLogin]
exten => s,1,NoOp(Agent ${AgentNumber} login)
 same => n,Set(CHANNEL(hangup_handler_push)=AgentLogin,callstatus,1)
 same => n,Answer()
 same => n,Set(AgentStatus=LoginInitiated)
 same => n,Set(AgentInformation=${SHELL(curl -s "${US4GROUP_AgentLogin}AgentID=${AgentNumber}&AgentStatus=${AgentStatus}")})
 same => n,Set(CHANNEL(dtmf_features)=HT)
 same => n,Authenticate(${AgentPassword})
 same => n,Set(AgentStatus=LoginCompleted)
 same => n,AgentLogin(${AgentNumber})
 same => n,Set(AgentSuccess=${SHELL(curl -s "${US4GROUP_AgentLoginSuccess}AgentID=${AgentNumber}")})
 same => n,Hangup()

exten => callstatus,1,NoOp(Agent login hangup)
 same => n,GotoIf($["${AgentStatus}" = "LoginCompleted"]?AgentLogin,HangME)
 same => n,Set(AgentHangupStatus=${SHELL(curl -s "${US4GROUP_AgentLogout}AgentID=${AgentNumber}&AgentStatus=LoginFailed")})
 same => n(HangME),Hangup()

; =============================================================================
; PHASE 3: subroutines (IncomingCall, CallAnswered, CallHangup)
; =============================================================================
[pbx-phase3-incoming]
exten => s,1,NoOp(Phase3 IncomingCall - Agent ${ARG4})
 same => n,Set(PHASE3_URL=${PHASE3_INCOMING_CALL}AgentID=${ARG4}&UniqueID=${ARG2}&ChannelID=${URIENCODE(${CHANNEL(name)})}&CustomerChannelID=${URIENCODE(${ARG1})}&CustomerNumber=${URIENCODE(${ARG3})}&QueueName=${URIENCODE(${ARG5})}&CampaignName=${URIENCODE(${ARG6})}&DID=${URIENCODE(${ARG7})})
 same => n,Set(PHASE3_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${PHASE3_URL}")})
 same => n,Return()

[pbx-phase3-answered]
exten => s,1,NoOp(Phase3 CallAnswered - UniqueID ${ARG1} Agent ${ARG2})
 same => n,Set(PHASE3_URL=${PHASE3_CALL_ANSWERED}AgentID=${ARG2}&UniqueID=${ARG1})
 same => n,Set(PHASE3_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${PHASE3_URL}")})
 same => n,Return()

[pbx-phase3-hangup]
exten => s,1,NoOp(Phase3 CallHangup - UniqueID ${ARG1} Agent ${ARG2} Status ${ARG3})
 same => n,GotoIf($["${ARG3}" = ""]?setstatus)
 same => n,Set(PHASE3_STATUS=${ARG3})
 same => n,Goto(url)
 same => n(setstatus),Set(PHASE3_STATUS=completed)
 same => n(url),Set(PHASE3_URL=${PHASE3_CALL_HANGUP}UniqueID=${ARG1}&Status=${URIENCODE(${PHASE3_STATUS})})
 same => n,GotoIf($["${ARG2}" = ""]?curl)
 same => n,Set(PHASE3_URL=${PHASE3_URL}&AgentID=${ARG2})
 same => n(curl),Set(PHASE3_RESULT=${SHELL(curl -s -o /dev/null -w "%{http_code}" "${PHASE3_URL}")})
 same => n,Return()

[pbx-phase3-ring-one]
exten => s,1,NoOp(Phase3 ring agent ${ARG1} queue ${ARG2})
 same => n,Set(PHASE3_AGENT_ID=${ARG1})
 same => n,Set(PHASE3_QUEUE_NAME=${ARG2})
 same => n,Set(PHASE3_UNIQUE_ID=${UNIQUEID})
 same => n,Set(CHANNEL(hangup_handler_push)=pbx-phase3-hangup-customer,1)
 same => n,Dial(PJSIP/${ARG1},30,b(pbx-phase3-incoming^s^1(${CHANNEL(name)}^${UNIQUEID}^${CALLERID(num)}^${ARG1}^${ARG2}^${PHASE3_CAMPAIGN_NAME}^${CallerDnid})),B(pbx-phase3-answered^s^1(${UNIQUEID}^${ARG1})),e)
 same => n,Goto(pbx-phase3-dial-${DIALSTATUS},1)

exten => h,1,NoOp(Phase3 customer hangup)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},completed))
 same => n,Return()

exten => pbx-phase3-dial-ANSWER,1,NoOp(Phase3 bridge ended)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},completed))
 same => n,Hangup()

exten => pbx-phase3-dial-NOANSWER,1,NoOp(Phase3 no answer)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},noanswer))
 same => n,Return()

exten => pbx-phase3-dial-BUSY,1,NoOp(Phase3 busy)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},busy))
 same => n,Return()

exten => pbx-phase3-dial-CHANUNAVAIL,1,NoOp(Phase3 channunavail)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},failed))
 same => n,Return()

exten => _pbx-phase3-dial-.,1,NoOp(Phase3 dial status ${DIALSTATUS})
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},${DIALSTATUS}))
 same => n,Return()

[pbx-phase3-hangup-customer]
exten => s,1,NoOp(Phase3 hangup handler)
 same => n,Gosub(pbx-phase3-hangup,s,1(${PHASE3_UNIQUE_ID},${PHASE3_AGENT_ID},completed))
 same => n,Return()

; =============================================================================
; Optional: from-pstn – point your trunk to this, then Goto inbound
; =============================================================================
[from-pstn]
exten => _X.,1,NoOp(Call from trunk ${EXTEN})
 same => n,Set(CALLERID(dnid)=${EXTEN})
 same => n,Goto(inbound,s,1)

; =============================================================================
; Optional: internal dial (e.g. agent dials 9 + number for outbound)
; =============================================================================
[from-internal]
exten => _9.,1,NoOp(Internal outbound ${EXTEN:1})
 same => n,Goto(from-pstn,${EXTEN:1},1)
